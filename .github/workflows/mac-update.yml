name: Mac update

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Send update request
        env:
          MAC_UPDATE_BEARER_KEY: ${{ secrets.MAC_UPDATE_BEARER_KEY }}
        run: |
          : "${MAC_UPDATE_BEARER_KEY:?MAC_UPDATE_BEARER_KEY secret is not set}"
          curl --fail --show-error --silent --request POST \
            --header "Authorization: BEARER ${MAC_UPDATE_BEARER_KEY}" \
            https://mac.stf.lol/update/decideroo
